############ GPU
vo=gpu
hwdec=nvdec
gpu-context=wayland
#gpu-api=vulkan

############ 高画质
profile=gpu-hq
scale=ewa_lanczossharp
cscale=ewa_lanczossharp


############ Anime4K 默认模式 高性能模式 
glsl-shaders="~~/shaders/glsl/Deblur/Anime4K_Deblur_DoG.glsl:~~/shaders/glsl/Restore/Anime4K_Restore_CNN_M.glsl:~~/shaders/glsl/Upscale/Anime4K_Upscale_CNN_x2_L.glsl"

# ===================== HDR 自动开启配置 =====================
# 自动计算 HDR 视频峰值亮度（核心 HDR 适配参数）
hdr-compute-peak=yes
# HDR 色调映射算法（官方推荐，自动适配 HDR 视频）
tone-mapping=bt.2446a
# 色调映射参数（平衡亮暗细节）
tone-mapping-param=1.0
# 显示器峰值亮度（按实际调整：400/600/800/1000）
target-peak=800
# 色域映射（避免 HDR 色彩溢出，官方参数）
gamut-mapping-mode=desaturate
# 色域裁剪（避免色彩溢出）
gamut-mapping-mode=desaturate

############ shader缓存
gpu-shader-cache=yes

##########插帧
vf=vapoursynth=~/.config/mpv/rife.vpy

#########从上次退出位置继续播放
save-position-on-quit=yes

